<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <title>Offline - Discount App</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #121212;
        color: #fff;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        text-align: center;
        background: #1f1f1f;
        border: 1px solid #333;
        border-radius: 14px;
        padding: 24px;
      }
      button {
        margin-top: 16px;
        border: 0;
        border-radius: 10px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        Cached data is still available. Please reconnect to sync likes, favorites,
        cart changes, and profile updates.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
