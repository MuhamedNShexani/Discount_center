name: Render keep-alive

on:
  schedule:
    # every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend health endpoint
        env:
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          if [ -z "$BACKEND_HEALTH_URL" ]; then
            echo "Missing secret BACKEND_HEALTH_URL"
            exit 1
          fi
          curl -fsS --max-time 30 "$BACKEND_HEALTH_URL" | head -c 200
